<div *ngIf="userProfile$ | async as profile; else showLoginMessage">
  <h1>Documentos</h1>
  <p>Tu rol es: <strong>{{ profile.perfil_ciis.rol }}</strong></p>

  <button *ngIf="profile.perfil_ciis.rol === 'ADMIN_CIIS' || profile.perfil_ciis.rol === 'INVESTIGADOR'">
    Subir Nuevo Documento
  </button>

  <div *ngIf="isLoading">Cargando documentos...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <ul *ngIf="!isLoading && documentos.length > 0">
    <li *ngFor="let doc of documentos">
      <span>{{ doc.titulo }} - {{ doc.descripcion }}</span>
      <button *ngIf="profile.perfil_ciis.rol === 'ADMIN_CIIS'">Eliminar</button>
    </li>
  </ul>

  <div *ngIf="!isLoading && !error && documentos.length === 0">
    No hay documentos para mostrar.
  </div>
</div>

<ng-template #showLoginMessage>
  <p>Por favor, <a routerLink="/login">inicia sesión</a> para ver los documentos.</p>
</ng-template>
