<div class="login-container">

  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <p>Ingresa a la plataforma CREAPTICA</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="tu.correo@udenar.edu.co">
        <div *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)" class="validation-error">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Introduce un correo válido.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••">
      </div>

      <div *ngIf="errorMessage" class="server-error">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
    </form>

    <div class="register-link">
      ¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a>
    </div>
  </div>

</div>
